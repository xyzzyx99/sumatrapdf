name: Fast_Build
on:
  #push:
  #pull_request:
  #repository_dispatch:
  #  types: [build-pre-rel]
  workflow_dispatch:    
jobs:
  build:
    name: Fast_Build
    #runs-on: SumatraBuilder
    runs-on: windows-latest
    #runs-on: windows-2025-vs2026
    steps:
      - name: Check out source code
        uses: actions/checkout@v6
        with:
          # needed to calc build number via git log --oneline
          fetch-depth: 0

      - name: Install bun
        uses: oven-sh/setup-bun@v2

      - name: Force Release x64 AVX2 O2
        shell: pwsh
        run: |
          @'
          <Project>
            <ItemDefinitionGroup Condition="'$(Configuration)|$(Platform)'=='Release|x64'">
              <ClCompile>
                <Optimization>MaxSpeed</Optimization>
                <EnableEnhancedInstructionSet>AdvancedVectorExtensions2</EnableEnhancedInstructionSet>
              </ClCompile>
            </ItemDefinitionGroup>
          </Project>
          '@ | Set-Content -Encoding UTF8 Directory.Build.targets

      - name: Build
        env:
          R2_SECRET: ${{ secrets.R2_SECRET }}
          R2_ACCESS: ${{ secrets.R2_ACCESS }}
          BB_SECRET: ${{ secrets.BB_SECRET }}
          BB_ACCESS: ${{ secrets.BB_ACCESS }}
        run: bun .\cmd\ci-build.ts
        #run: bun .\cmd\build-ci.ts
      - name: List build outputs
        shell: pwsh
        run: |
          Get-ChildItem -Recurse -File |
            Where-Object { $_.Extension -in ".exe", ".dll", ".pdb" } |
            Select-Object FullName

      - name: Upload build output
        uses: actions/upload-artifact@v4
        with:
          name: SumatraPDF-build
          path: |
            **/*.exe
            **/*.dll
            **/*.pdb        
